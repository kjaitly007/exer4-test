name: buildfork

on:
  workflow_dispatch:


jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: cache
        uses: actions/cache@v5.0.3
        with:
          path: ~/.npm
          key: buildCache
      - run: npm ci
      - run: npm test -- --coverage
        env:
          CI: true
      - name: upload code coverage
        uses: actions/upload-artifact@v7.0.0
        with:
          name: codecoverage
          path: coverage
      - name:  build
        run: npm run build
      - name: upload build files
        uses: actions/upload-artifact@v7.0.0
        with:
          name: build
          path: build
      
          
